  - review_id: LC-003
    date: 2026-04-11
    area: metrics
    description: Suspicious paragraph-join counts are likely inflated for the chess corpus because notation-heavy text and compressed move formatting resemble boundary corruption.
    why_uncertain: The baseline metric is still useful comparatively, but its absolute value should not be interpreted as a literal editorial defect count.
    confidence: medium
    related_task: T3-004
    status: OPEN
    decision_needed_from: QA / Regression
    next_action: Preserve the metric for before/after comparison and keep its interpretation caveated in release scoring until broader fixtures are added.

