normalization_rules:
  - This backlog supersedes the earlier EPUB-only execution model.
  - Earlier EPUB-only reports remain valid historical evidence, but they do not satisfy the current end-to-end PDF-first brief unless the new task explicitly matches and was re-executed under this brief.
  - KINDLE MASTER and foreign frontend/runtime must be treated as separate projects; any overlap is a tracked defect and release blocker.
  - PDF-first support must not be assumed until a repo-local PDF fixture and a validated PDF-to-EPUB toolchain both exist.
  - Recovery work must prove what improved, what failed, and what regressed before any premium tuning continues.
  - Recovery phases R1 to R6 must not start until Phase R0 root cause is explicit.
  - No READY is allowed unless all mandatory test classes exist, all required scenario profiles are covered or explicitly release-blocked, and release gates pass on the final EPUB.
  - Phase 12 test-matrix and release-gate evidence are authoritative release controls, not optional documentation.
  - Release-authoritative metadata must come from manifest-backed publication records or explicit runtime overrides; source-file heuristics alone are exploratory evidence only.
  - If the project is NOT READY, continuation tasks must be created and execution continues automatically.
