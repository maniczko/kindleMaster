name: Execution task
description: Use for setup, maintenance, or delivery tasks that should be autonomously executable.
title: "[TASK] "
labels: ["type:task"]
body:
  - type: input
    id: backlog_id
    attributes:
      label: Backlog ID
      placeholder: SETUP-013
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - repo
        - frontend
        - data
        - integrations
        - docs
        - qa
    validations:
      required: true
  - type: input
    id: owner_role
    attributes:
      label: Owner role
      placeholder: Repo Maintainer
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: Proposed milestone
      options:
        - M0 Setup Hardening
        - M1 GitHub Operating Model
        - M2 Verification Foundation
        - M3 Beta Readiness
        - M4 Release Candidate
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task statement
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
    validations:
      required: true
  - type: textarea
    id: outputs
    attributes:
      label: Expected outputs
      description: Name the files, docs, settings, or artifacts that should exist when this task is done.
    validations:
      required: true
  - type: textarea
    id: quality_gates
    attributes:
      label: Quality gates
      description: List the required gates or use the backlog quality gate codes.
      placeholder: QG-01, QG-02, QG-03
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Task definition of done
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Expected evidence
    validations:
      required: true
