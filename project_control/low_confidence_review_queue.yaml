  - review_id: LC-012
    date: 2026-04-12
    area: text_cleanup
    description: The full split-word scan found `Sylwester- Kanofocka`, which may be a true hyphenated surname with broken spacing rather than a generic word-split artifact.
    why_uncertain: The correct recovery may be to keep the hyphen and remove only the whitespace, but proper-name handling should remain conservative until the medium-confidence cleanup stage.
    confidence: medium
    related_task: R3-001
    status: RESOLVED
    decision_needed_from: Text Cleanup
    next_action: Tracked split-word uncertainty no longer remains in the processed guard outputs; future proper-name ambiguities should still route to review rather than forcing unsafe automatic rewrites.

  - review_id: LC-013
    date: 2026-04-12
    area: text_cleanup
    description: The joined-word audit previously left a review-only set dominated by names and brand-like tokens such as `McCullough`, `ArchiMate`, `InPlus`, `AdvisoryNow`, `AccountAbility`, and `LinkedInie`, but the current pass now suppresses the tracked false-positive subset deterministically instead of treating it as residual cleanup debt.
    why_uncertain: The original ambiguity came from naive lower-to-upper token boundaries that resembled glued words; the current policy now treats the tracked brand/proper-name subset as false positives rather than unresolved editorial fixes.
    confidence: medium
    related_task: R3-002
    status: RESOLVED
    decision_needed_from: Text Cleanup
    next_action: Keep extending deterministic false-positive suppression carefully and route any newly discovered ambiguous CamelCase tokens into review instead of forcing unsafe automatic cleanup.

  - review_id: LC-014
    date: 2026-04-12
    area: text_cleanup
    description: The refined boundary scan still finds a small set of lowercase-continuation candidates concentrated in front matter, TOC-like pages, and organizational sections.
    why_uncertain: These candidates may reflect page-based conversion and dense masthead layouts rather than true broken sentence or paragraph joins, so automatic merges would be risky without stronger section-aware logic.
    confidence: medium
    related_task: R3-003
    status: RESOLVED
    decision_needed_from: Structure & Semantics
    next_action: Front-matter semantics and special-section TOC protection now absorb the tracked boundary ambiguity on the guard set, so future review should focus on newly discovered unseen-profile cases only.

